spring:
  datasource:
    url: jdbc:mysql://localhost:3306/quantity_measurement?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 66070007025-ktjj8k4nmr6htiiu43is89cabv4nqoh4.apps.googleusercontent.com
            client-secret: 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
            scope:
              - email
              - profile
              - openid
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

app:
  oauth2:
    redirect-uri: http://localhost:3000/auth
  jwt:
    secret: VGhpc0lzQVNlY3VyZVNob3VsZEF0TGVhc3QzMkNoYXJhY3RlcnNMb25n
    expiration-ms: 86400000

logging:
  level:
    root: INFO
    com.app.quantity_measurement_app: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html